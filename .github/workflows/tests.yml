name: tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The suite is deliberately dependency-free (stdlib only), so there is no
      # install step — CI runs exactly what adopters run locally.
      - name: Run tests
        run: python -m unittest discover -s tests -v
